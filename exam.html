<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam Prep - Singh Ji AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .exam-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .exam-header { background: linear-gradient(135deg, #4a90d9, #357abd); color: white; padding: 20px; border-radius: 16px; text-align: center; }
        .exam-header .sub { font-size: 14px; opacity: 0.8; }
        .exam-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .exam-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
        .exam-card:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .exam-card .icon { font-size: 40px; display: block; }
        .exam-card .name { font-weight: 500; margin-top: 5px; }
        .exam-card .count { font-size: 12px; color: #888; }
        .quiz-box { background: white; border-radius: 12px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .quiz-box .question { font-size: 18px; font-weight: 500; }
        .quiz-box .options { margin-top: 15px; }
        .quiz-box .option { display: block; width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 10px; background: white; cursor: pointer; text-align: left; transition: all 0.2s; }
        .quiz-box .option:hover { background: #f0f0f0; }
        .quiz-box .option.correct { background: #d4edda; border-color: #07C160; }
        .quiz-box .option.wrong { background: #f8d7da; border-color: #ff6b6b; }
        .quiz-box .score { margin-top: 15px; font-size: 16px; }
        .ai-tutor { background: #f0f7ff; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 4px solid #4a90d9; }
    </style>
</head>
<body>
    <div class="exam-container">
        <div class="exam-header">
            <h2>📚 AI Exam Prep</h2>
            <div class="sub">🤖 AI Tutor — NCERT + Competitive Exams</div>
        </div>

        <div class="exam-grid">
            <div class="exam-card" onclick="startQuiz('maths')">
                <span class="icon">📐</span>
                <div class="name">Mathematics</div>
                <div class="count">15 Questions</div>
            </div>
            <div class="exam-card" onclick="startQuiz('science')">
                <span class="icon">🔬</span>
                <div class="name">Science</div>
                <div class="count">12 Questions</div>
            </div>
            <div class="exam-card" onclick="startQuiz('english')">
                <span class="icon">📖</span>
                <div class="name">English</div>
                <div class="count">10 Questions</div>
            </div>
            <div class="exam-card" onclick="startQuiz('gk')">
                <span class="icon">🌍</span>
                <div class="name">General Knowledge</div>
                <div class="count">20 Questions</div>
            </div>
        </div>

        <div class="ai-tutor">
            <strong>🤖 AI Tutor Says:</strong>
            <p style="font-size: 14px; color: #555; margin-top: 5px;" id="tutorMessage">"NCERT से पढ़ाई करो! मैं तुम्हारी मदद करूंगा।"</p>
        </div>

        <div class="quiz-box" id="quizBox">
            <div class="question" id="questionText">प्रश्न 1: 2 + 2 = ?</div>
            <div class="options" id="optionsContainer">
                <button class="option" onclick="checkAnswer(this, 1)">A) 3</button>
                <button class="option" onclick="checkAnswer(this, 2)">B) 4</button>
                <button class="option" onclick="checkAnswer(this, 3)">C) 5</button>
                <button class="option" onclick="checkAnswer(this, 4)">D) 6</button>
            </div>
            <div class="score" id="scoreDisplay">Score: 0/0</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html">🏠</a>
        <a href="moments.html">📷</a>
        <a href="stories.html">📸</a>
        <a href="profile.html">👤</a>
        <a href="mini-apps.html">📱</a>
    </nav>

    <script>
        let currentQuiz = [];
        let currentIndex = 0;
        let score = 0;
        let totalQuestions = 0;

        const quizzes = {
            maths: {
                questions: [
                    { q: '2 + 2 = ?', options: ['3', '4', '5', '6'], correct: 1 },
                    { q: '5 × 5 = ?', options: ['20', '25', '30', '35'], correct: 1 },
                    { q: '100 ÷ 4 = ?', options: ['20', '25', '30', '35'], correct: 1 }
                ]
            },
            science: {
                questions: [
                    { q: 'पानी का रासायनिक सूत्र क्या है?', options: ['H2O', 'CO2', 'NaCl', 'HCl'], correct: 0 },
                    { q: 'सूर्य किस गैस से बना है?', options: ['Oxygen', 'Hydrogen', 'Nitrogen', 'Helium'], correct: 1 }
                ]
            },
            english: {
                questions: [
                    { q: 'What is the synonym of "Happy"?', options: ['Sad', 'Joyful', 'Angry', 'Tired'], correct: 1 },
                    { q: 'What is the plural of "Child"?', options: ['Childs', 'Children', 'Childrens', 'Childes'], correct: 1 }
                ]
            },
            gk: {
                questions: [
                    { q: 'भारत की राजधानी क्या है?', options: ['Mumbai', 'Delhi', 'Kolkata', 'Chennai'], correct: 1 },
                    { q: 'भारत का राष्ट्रीय पशु क्या है?', options: ['Lion', 'Tiger', 'Elephant', 'Peacock'], correct: 1 },
                    { q: 'गंगा नदी कहाँ से निकलती है?', options: ['Himalaya', 'Vindhya', 'Satpura', 'Western Ghats'], correct: 0 }
                ]
            }
        };

        function startQuiz(subject) {
            currentQuiz = quizzes[subject]?.questions || [];
            if (currentQuiz.length === 0) return alert('❌ No questions available!');
            currentIndex = 0;
            score = 0;
            totalQuestions = currentQuiz.length;
            document.getElementById('quizBox').style.display = 'block';
            document.getElementById('tutorMessage').textContent = `📚 ${subject.toUpperCase()} की पढ़ाई शुरू करो! ${totalQuestions} प्रश्न हैं।`;
            renderQuestion();
            document.getElementById('quizBox').scrollIntoView({ behavior: 'smooth' });
        }

        function renderQuestion() {
            if (currentIndex >= totalQuestions) {
                document.getElementById('questionText').textContent = '🎉 Quiz Complete!';
                document.getElementById('optionsContainer').innerHTML = '';
                document.getElementById('scoreDisplay').textContent = `Final Score: ${score}/${totalQuestions}`;
                document.getElementById('tutorMessage').textContent = `🎉 बधाई! ${score}/${totalQuestions} सही। ${score/totalQuestions*100 > 70 ? 'शानदार!' : 'फिर से कोशिश करो!'}`;
                return;
            }
            const q = currentQuiz[currentIndex];
            document.getElementById('questionText').textContent = `प्रश्न ${currentIndex+1}: ${q.q}`;
            document.getElementById('optionsContainer').innerHTML = q.options.map((opt, i) =>
                `<button class="option" onclick="checkAnswer(this, ${i})">${String.fromCharCode(65+i)}) ${opt}</button>`
            ).join('');
            document.getElementById('scoreDisplay').textContent = `Score: ${score}/${totalQuestions}`;
        }

        function checkAnswer(btn, selected) {
            const q = currentQuiz[currentIndex];
            const correct = q.correct;
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach((b, i) => {
                if (i === correct) b.classList.add('correct');
                if (i === selected && selected !== correct) b.classList.add('wrong');
                b.onclick = null;
            });
            if (selected === correct) score++;
            document.getElementById('scoreDisplay').textContent = `Score: ${score}/${totalQuestions}`;
            currentIndex++;
            setTimeout(() => renderQuestion(), 1000);
        }
    </script>
</body>
</html>
