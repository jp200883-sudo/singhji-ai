<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Singh Ji AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container { max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #f5f5f5; }
        .chat-header { background: #07C160; color: white; padding: 15px; display: flex; align-items: center; }
        .chat-header .back { font-size: 24px; margin-right: 15px; cursor: pointer; }
        .chat-header .title { flex: 1; font-size: 18px; font-weight: bold; }
        .chat-header .online { font-size: 12px; opacity: 0.8; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; word-wrap: break-word; }
        .message.sent { background: #07C160; color: white; align-self: flex-end; margin-left: auto; }
        .message.received { background: white; color: #333; align-self: flex-start; }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; }
        .chat-input { display: flex; padding: 10px; background: white; border-top: 1px solid #ddd; position: sticky; bottom: 0; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .chat-input button { background: #07C160; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; font-size: 20px; }
        .chat-input button:hover { background: #05a04d; }
        .ai-typing { color: #888; font-style: italic; padding: 10px; display: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span class="back" onclick="history.back()">‹</span>
            <div class="title">
                🤖 Singh Ji AI
                <div class="online">🟢 Online</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message received">
                👋 नमस्ते! मैं Singh Ji AI हूँ। कैसे मदद कर सकता हूँ?
                <span class="time">10:30 AM</span>
            </div>
            <div class="message sent">
                क्या आज मंडी में भाव कैसा है?
                <span class="time">10:31 AM</span>
            </div>
            <div class="message received">
                📊 आज दिल्ली मंडी में गेहूँ ₹2,400/quintal है, प्याज ₹1,800/quintal है।
                <span class="time">10:31 AM</span>
            </div>
        </div>

        <div class="ai-typing" id="aiTyping">🤖 AI सोच रहा है...</div>

        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="संदेश लिखें..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            const messages = document.getElementById('chatMessages');
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message sent';
            userMsg.innerHTML = text + `<span class="time">${time}</span>`;
            messages.appendChild(userMsg);

            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // Show AI typing
            document.getElementById('aiTyping').style.display = 'block';
            messages.scrollTop = messages.scrollHeight;

            // AI response
            setTimeout(() => {
                document.getElementById('aiTyping').style.display = 'none';
                const responses = [
                    "🤖 अच्छी बात है! मैं आपकी मदद करूंगा।",
                    "📈 आज का ट्रेंड बहुत अच्छा है!",
                    "🌾 क्या आप किसान हैं? मैं फसल की जानकारी दे सकता हूँ।",
                    "💪 WeChat killer! Singh Ji AI 1000% better!",
                    "🦁 आपका दिन शुभ हो! क्या और पूछना है?"
                ];
                const reply = document.createElement('div');
                reply.className = 'message received';
                reply.innerHTML = responses[Math.floor(Math.random() * responses.length)] + `<span class="time">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
                messages.appendChild(reply);
                messages.scrollTop = messages.scrollHeight;
            }, 1000 + Math.random() * 1500);
        }
    </script>
</body>
</html>
