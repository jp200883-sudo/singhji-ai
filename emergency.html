<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singh Ji Emergency - Singh Ji AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .emergency-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .sos-btn { background: #ff0000; color: white; border: none; border-radius: 50%; width: 150px; height: 150px; font-size: 48px; display: block; margin: 30px auto; cursor: pointer; box-shadow: 0 4px 20px rgba(255,0,0,0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .emergency-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .emergency-item { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
        .emergency-item:hover { transform: translateY(-3px); }
        .emergency-item .icon { font-size: 36px; display: block; }
        .emergency-item .label { margin-top: 8px; font-weight: 500; }
        .emergency-item .number { font-size: 14px; color: #888; }
        .location-share { background: #f0f7ff; padding: 15px; border-radius: 12px; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .location-share .loc { font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <div class="emergency-container">
        <h2>🚨 Singh Ji Emergency</h2>
        <p>तुरंत मदद — एक क्लिक में!</p>

        <button class="sos-btn" onclick="sosAlert()">🚨<br>SOS</button>

        <div class="emergency-grid">
            <div class="emergency-item" onclick="callEmergency('police')">
                <span class="icon">👮</span>
                <div class="label">Police</div>
                <div class="number">100</div>
            </div>
            <div class="emergency-item" onclick="callEmergency('ambulance')">
                <span class="icon">🚑</span>
                <div class="label">Ambulance</div>
                <div class="number">108</div>
            </div>
            <div class="emergency-item" onclick="callEmergency('fire')">
                <span class="icon">🚒</span>
                <div class="label">Fire</div>
                <div class="number">101</div>
            </div>
            <div class="emergency-item" onclick="callEmergency('disaster')">
                <span class="icon">🌊</span>
                <div class="label">Disaster</div>
                <div class="number">1070</div>
            </div>
        </div>

        <div class="location-share">
            <div class="loc">📍 <span id="locationText">Location: Delhi, India</span></div>
            <button style="background: #07C160; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;" onclick="shareLocation()">Share</button>
        </div>

        <div style="margin-top: 20px; background: #fff3cd; padding: 15px; border-radius: 12px; border-left: 4px solid #ffc107;">
            <strong>⚠️ Emergency Contacts Saved</strong><br>
            <span style="font-size: 14px; color: #555;">Police: 100 | Ambulance: 108 | Fire: 101</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html">🏠</a>
        <a href="moments.html">📷</a>
        <a href="stories.html">📸</a>
        <a href="profile.html">👤</a>
        <a href="mini-apps.html">📱</a>
    </nav>

    <script>
        function sosAlert() {
            if (confirm("🚨 क्या आपको तुरंत मदद चाहिए? अपनी लोकेशन शेयर करें?")) {
                const location = "Delhi, India"; // Real location from geolocation
                alert(`🆘 SOS! आपकी लोकेशन: ${location}\n\n✅ पुलिस और एम्बुलेंस को सूचना भेजी गई!`);
                // Real implementation: Send location to emergency services
            }
        }

        function callEmergency(type) {
            const numbers = { police: '100', ambulance: '108', fire: '101', disaster: '1070' };
            const names = { police: 'पुलिस', ambulance: 'एम्बुलेंस', fire: 'अग्निशमन', disaster: 'आपदा' };
            const msg = `📞 ${names[type]} को कॉल करें: ${numbers[type]}\n\n✅ क्या आप ₹10 से ₹100 तक कॉल बैलेंस दान करना चाहेंगे?`;
            if (confirm(msg)) {
                alert(`🔗 ${names[type]} को कॉल कनेक्ट कर रहे हैं...\n\n🦁 Singh Ji AI: "तुरंत मदद भेजी जा रही है!"`);
            }
        }

        function shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const loc = `Lat: ${pos.coords.latitude}, Lng: ${pos.coords.longitude}`;
                    document.getElementById('locationText').textContent = `📍 ${loc}`;
                    navigator.clipboard.writeText(loc);
                    alert(`✅ Location shared: ${loc}`);
                }, () => {
                    alert("📍 Location: Delhi, India (Default)");
                });
            } else {
                alert("📍 Location: Delhi, India");
            }
        }
    </script>
</body>
</html>
