<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 Singh Ji Pay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #0f0f23;
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid #ffd700;
        }
        .logo { font-size: 50px; margin-bottom: 10px; }
        h1 { color: #ffd700; margin-bottom: 5px; font-size: 28px; }
        .tagline { color: #888; margin-bottom: 20px; font-size: 14px; }
        
        .qr-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            border: 3px solid #ffd700;
        }
        .qr-card img {
            width: 100%;
            max-width: 300px;
            border-radius: 10px;
        }
        
        .upi-id {
            background: #1a1a2e;
            color: #00ff88;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
            margin: 15px 0;
            display: inline-block;
            border: 2px solid #00ff88;
        }
        
        .amount-section { margin: 20px 0; }
        .amount-input {
            width: 100%;
            padding: 15px;
            font-size: 22px;
            text-align: center;
            border: 2px solid #333;
            border-radius: 10px;
            margin: 10px 0;
            background: #1a1a2e;
            color: white;
        }
        
        .pay-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .pay-btn:hover { transform: scale(1.05); }
        
        .apps {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .app-btn {
            background: #1a1a2e;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .app-btn:hover { background: #ffd700; color: #1a1a2e; }
        
        .commission {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 10px;
            font-size: 13px;
            color: #888;
        }
        .commission span { color: #00ff88; font-weight: bold; }
        
        .footer {
            margin-top: 20px;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🦁</div>
        <h1>Singh Ji Pay</h1>
        <p class="tagline">"India ka Apna Gateway — Sab kuch FREE!"</p>
        
        <!-- QR CODE IMAGE -->
        <div class="qr-card">
            <img src="singhji_qr.png" alt="Singh Ji QR Code">
        </div>
        
        <div class="upi-id">📱 jp200883@sbi</div>
        
        <div class="amount-section">
            <input type="number" class="amount-input" id="amount" placeholder="₹ Enter Amount" value="100">
            <button class="pay-btn" onclick="payUPI()">📱 Pay via UPI App</button>
            <button class="pay-btn" onclick="payCard()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">💳 Card / Wallet</button>
        </div>
        
        <div class="apps">
            <button class="app-btn" onclick="openApp('phonepe')">📱 PhonePe</button>
            <button class="app-btn" onclick="openApp('gpay')">💚 GPay</button>
            <button class="app-btn" onclick="openApp('paytm')">💙 Paytm</button>
            <button class="app-btn" onclick="openApp('bhim')">🟠 BHIM</button>
        </div>
        
        <div class="commission">
            💰 <span>0% Commission</span> on UPI | <span>2%</span> on Cards<br>
            Singh Ji Gateway — Merchant ID: SJ001
        </div>
        
        <div class="footer">
            🔒 Secured by Singh Ji AI Ultra v5.0<br>
            © 2026 Singh Ji AI. All Rights Reserved.
        </div>
    </div>

    <script>
        const UPI_ID = 'jp200883@sbi';
        const MERCHANT_NAME = 'Singh Ji AI';
        
        function payUPI() {
            const amount = document.getElementById('amount').value;
            const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amount}&cu=INR`;
            window.location.href = upiUrl;
        }
        
        function payCard() {
            alert('💳 Card payment coming soon via Razorpay!\n\nFor now, use UPI — 0% commission!');
        }
        
        function openApp(app) {
            const amount = document.getElementById('amount').value || '0';
            const links = {
                'phonepe': `phonepe://pay?pa=${UPI_ID}&pn=${MERCHANT_NAME}&am=${amount}&cu=INR`,
                'gpay': `tez://upi/pay?pa=${UPI_ID}&pn=${MERCHANT_NAME}&am=${amount}&cu=INR`,
                'paytm': `paytmmp://upi/pay?pa=${UPI_ID}&pn=${MERCHANT_NAME}&am=${amount}&cu=INR`,
                'bhim': `bhim://upi/pay?pa=${UPI_ID}&pn=${MERCHANT_NAME}&am=${amount}&cu=INR`
            };
            window.location.href = links[app] || links['phonepe'];
        }
    </script>
</body>
</html>
