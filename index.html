<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FF6B00">
<title>Singh Ji AI</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:white;min-height:100vh}
.header{background:#FF6B00;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.tabs{display:flex;overflow-x:auto;background:#16213e;padding:5px}
.tab{padding:8px 16px;border:none;background:transparent;color:#aaa;cursor:pointer;white-space:nowrap;font-size:14px;border-radius:20px}
.tab.active{background:#FF6B00;color:white}
.content{padding:15px;display:none}
.content.active{display:block}
.chat-messages{height:55vh;overflow-y:auto;padding:10px;background:#16213e;border-radius:10px;margin-bottom:10px}
.msg{margin:8px 0}
.msg.user{text-align:right}
.msg.user span{background:#FF6B00;padding:8px 12px;border-radius:12px 12px 0 12px;display:inline-block;max-width:80%}
.msg.bot span{background:#0f3460;padding:8px 12px;border-radius:12px 12px 12px 0;display:inline-block;max-width:80%}
.input-row{display:flex;gap:8px}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#16213e;color:white;font-size:14px}
button{background:#FF6B00;color:white;border:none;padding:10px 16px;border-radius:20px;cursor:pointer}
.feature-btn{width:100%;margin:5px 0;padding:12px;font-size:15px;border-radius:10px}
.result{background:#16213e;padding:12px;border-radius:10px;margin-top:10px;min-height:80px;white-space:pre-wrap;line-height:1.6}
select{width:100%;padding:10px;background:#16213e;color:white;border:1px solid #FF6B00;border-radius:10px;margin-bottom:10px}
textarea{width:100%;padding:10px;background:#16213e;color:white;border:1px solid #FF6B00;border-radius:10px;min-height:80px;margin-bottom:10px}
</style>
</head>
<body>
<div class="header">🤖 Singh Ji AI</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('chat')">💬 Chat</button>
  <button class="tab" onclick="showTab('weather')">🌤️ Weather</button>
  <button class="tab" onclick="showTab('news')">📰 News</button>
  <button class="tab" onclick="showTab('cricket')">🏏 Cricket</button>
  <button class="tab" onclick="showTab('horoscope')">⭐ Horoscope</button>
  <button class="tab" onclick="showTab('stock')">📈 Stock</button>
  <button class="tab" onclick="showTab('invoice')">🧾 Invoice</button>
  <button class="tab" onclick="showTab('task')">✅ Task</button>
  <button class="tab" onclick="showTab('finance')">💰 Finance</button>
  <button class="tab" onclick="showTab('guard')">🛡️ Guard</button>
</div>

<!-- CHAT -->
<div id="chat" class="content active">
  <div class="chat-messages" id="chat-messages">
    <div class="msg bot"><span>नमस्ते! मैं Singh Ji हूँ। कैसे मदद करूं? 🙏</span></div>
  </div>
  <div class="input-row">
    <input id="chat-input" placeholder="कुछ पूछो..." onkeypress="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">➤</button>
  </div>
</div>

<!-- WEATHER -->
<div id="weather" class="content">
  <div class="input-row">
    <input id="city-input" placeholder="शहर का नाम... (Kanpur)" value="Kanpur">
    <button onclick="getWeather()">देखो</button>
  </div>
  <div class="result" id="weather-result">यहाँ weather दिखेगा...</div>
</div>

<!-- NEWS -->
<div id="news" class="content">
  <button class="feature-btn" onclick="getNews()">📰 आज की खबरें लाओ</button>
  <div class="result" id="news-result">यहाँ news दिखेगी...</div>
</div>

<!-- CRICKET -->
<div id="cricket" class="content">
  <button class="feature-btn" onclick="getCricket()">🏏 Latest Cricket Scores</button>
  <div class="result" id="cricket-result">यहाँ cricket scores दिखेंगे...</div>
</div>

<!-- HOROSCOPE -->
<div id="horoscope" class="content">
  <select id="sign-select">
    <option>Aries</option><option>Taurus</option><option>Gemini</option>
    <option>Cancer</option><option>Leo</option><option>Virgo</option>
    <option>Libra</option><option>Scorpio</option><option>Sagittarius</option>
    <option>Capricorn</option><option>Aquarius</option><option>Pisces</option>
  </select>
  <button class="feature-btn" onclick="getHoroscope()">⭐ राशिफल देखो</button>
  <div class="result" id="horoscope-result">यहाँ राशिफल दिखेगा...</div>
</div>

<!-- STOCK -->
<div id="stock" class="content">
  <div class="input-row">
    <input id="stock-input" placeholder="Stock symbol... (RELIANCE)" value="RELIANCE">
    <button onclick="getStock()">देखो</button>
  </div>
  <div class="result" id="stock-result">यहाँ stock info दिखेगी...</div>
</div>

<!-- INVOICE -->
<div id="invoice" class="content">
  <textarea id="invoice-input" placeholder="Invoice details लिखो... जैसे: 5 kg चावल @ ₹50, 2 kg दाल @ ₹100"></textarea>
  <button class="feature-btn" onclick="getInvoice()">🧾 Invoice बनाओ</button>
  <div class="result" id="invoice-result">यहाँ invoice दिखेगा...</div>
</div>

<!-- TASK -->
<div id="task" class="content">
  <textarea id="task-input" placeholder="Task लिखो... जैसे: आज का काम - meeting, report, client call"></textarea>
  <button class="feature-btn" onclick="getTask()">✅ Tasks Organize करो</button>
  <div class="result" id="task-result">यहाँ tasks दिखेंगे...</div>
</div>

<!-- FINANCE -->
<div id="finance" class="content">
  <textarea id="finance-input" placeholder="Financial query लिखो... जैसे: ₹50000 invest करना है, कहाँ करूं?"></textarea>
  <button class="feature-btn" onclick="getFinance()">💰 Finance Advice लो</button>
  <div class="result" id="finance-result">यहाँ advice दिखेगी...</div>
</div>

<!-- GUARD -->
<div id="guard" class="content">
  <textarea id="guard-input" placeholder="Alert describe करो... जैसे: रात 2 बजे दरवाजे पर आवाज आई"></textarea>
  <button class="feature-btn" onclick="getGuard()">🛡️ Security Analysis करो</button>
  <div class="result" id="guard-result">यहाँ analysis दिखेगा...</div>
</div>

<script>
const API = "https://singhji-api.onrender.com";

function showTab(name) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  event.target.classList.add('active');
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  addMsg(msg, 'user');
  input.value = '';
  addMsg('टाइप हो रहा है...', 'bot', 'typing');
  try {
    const r = await fetch(API+'/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg})});
    const d = await r.json();
    document.getElementById('typing')?.remove();
    addMsg(d.reply, 'bot');
  } catch { document.getElementById('typing')?.remove(); addMsg('Error! Try again.', 'bot'); }
}

function addMsg(text, type, id) {
  const div = document.getElementById('chat-messages');
  div.innerHTML += `<div class="msg ${type}" ${id?'id='+id:''}><span>${text}</span></div>`;
  div.scrollTop = div.scrollHeight;
}

async function getWeather() {
  const city = document.getElementById('city-input').value || 'Kanpur';
  document.getElementById('weather-result').innerText = 'Loading...';
  const r = await fetch(API+'/weather?city='+city);
  const d = await r.json();
  document.getElementById('weather-result').innerText = d.reply;
}

async function getNews() {
  document.getElementById('news-result').innerText = 'खबरें आ रही हैं...';
  const r = await fetch(API+'/news');
  const d = await r.json();
  document.getElementById('news-result').innerText = d.reply;
}

async function getCricket() {
  document.getElementById('cricket-result').innerText = 'Scores आ रहे हैं...';
  const r = await fetch(API+'/cricket');
  const d = await r.json();
  document.getElementById('cricket-result').innerText = d.reply;
}

async function getHoroscope() {
  const sign = document.getElementById('sign-select').value;
  document.getElementById('horoscope-result').innerText = 'राशिफल आ रहा है...';
  const r = await fetch(API+'/horoscope', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sign:sign})});
  const d = await r.json();
  document.getElementById('horoscope-result').innerText = d.reply;
}

async function getStock() {
  const symbol = document.getElementById('stock-input').value || 'RELIANCE';
  document.getElementById('stock-result').innerText = 'Stock info आ रही है...';
  const r = await fetch(API+'/stock?symbol='+symbol);
  const d = await r.json();
  document.getElementById('stock-result').innerText = d.reply;
}

async function getInvoice() {
  const details = document.getElementById('invoice-input').value;
  document.getElementById('invoice-result').innerText = 'Invoice बन रहा है...';
  const r = await fetch(API+'/invoice', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({details:details})});
  const d = await r.json();
  document.getElementById('invoice-result').innerText = d.reply;
}

async function getTask() {
  const task = document.getElementById('task-input').value;
  document.getElementById('task-result').innerText = 'Tasks organize हो रहे हैं...';
  const r = await fetch(API+'/task', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task:task})});
  const d = await r.json();
  document.getElementById('task-result').innerText = d.reply;
}

async function getFinance() {
  const query = document.getElementById('finance-input').value;
  document.getElementById('finance-result').innerText = 'Advice आ रही है...';
  const r = await fetch(API+'/finance', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:query})});
  const d = await r.json();
  document.getElementById('finance-result').innerText = d.reply;
}

async function getGuard() {
  const alert = document.getElementById('guard-input').value;
  document.getElementById('guard-result').innerText = 'Analysis हो रहा है...';
  const r = await fetch(API+'/guard', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({alert:alert})});
  const d = await r.json();
  document.getElementById('guard-result').innerText = d.reply;
}
</script>
</body>
</html>
