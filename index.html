<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singh Ji AI Ultra - भारत का अपना AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(10,10,26,0.9); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
.logo { font-size: 1.4rem; font-weight: 800; color: #ff9f43; }
.btn { padding: 0.6rem 1.4rem; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
.btn-primary { background: linear-gradient(135deg, #feca57, #ff9f43); color: #0a0a1a; }
.hero { text-align: center; padding: 3rem 2rem; max-width: 900px; margin: 0 auto; }
.hero h1 { font-size: 3rem; font-weight: 900; }
.hero h1 span { background: linear-gradient(135deg, #feca57, #ff9f43); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chat-section { padding: 2rem; max-width: 750px; margin: 0 auto; }
.chat-demo { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 1.5rem; }
.chat-messages { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1rem; max-height: 300px; overflow-y: auto; }
.message { padding: 0.7rem 1rem; border-radius: 18px; max-width: 80%; font-size: 0.9rem; }
.message-ai { background: rgba(255,255,255,0.06); align-self: flex-start; }
.message-user { background: linear-gradient(135deg, #ff9f43, #e17055); align-self: flex-end; }
.message-error { background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3); color: #ff6b6b; }
.chat-input-area { display: flex; gap: 0.5rem; }
.chat-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 0.7rem 1.2rem; color: #fff; font-size: 0.9rem; outline: none; }
.chat-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: linear-gradient(135deg, #ff9f43, #a855f7); color: white; cursor: pointer; }
.features-grid { display: grid; grid-template: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.2rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
.feature-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 1.5rem; cursor: pointer; transition: all 0.3s; }
.feature-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.active { display: flex; }
.modal-content { background: #12122a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2rem; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
.close-btn { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: #a0a0b8; font-size: 1.5rem; cursor: pointer; }
.feature-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.8rem; color: #fff; margin: 1rem 0; }
.feature-result { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; margin-top: 1rem; min-height: 60px; font-size: 0.9rem; color: #a0a0b8; }
.upload-area { border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px; padding: 2rem; margin: 1rem 0; cursor: pointer; text-align: center; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 1rem 2rem; border-radius: 50px; font-weight: 600; z-index: 10000; display: none; }
.toast.show { display: block; }
.toast.success { border-color: #4cd137; }
.toast.error { border-color: #ff4757; }
.loading { display: inline-block; width: 16px; height: 16px; border: 2px solid transparent; border-top-color: #feca57; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<base target="_blank">
</head>
<body>

<header>
  <div class="logo">🦁 Singh Ji AI</div>
  <button class="btn btn-primary" onclick="document.getElementById('chat').scrollIntoView({behavior:'smooth'})">Get Started</button>
</header>

<section class="hero">
  <h1>ChatGPT से बेहतर<br><span>भारत का अपना AI!</span></h1>
  <p style="color:#a0a0b8; margin:1rem 0;">AI Chat, Weather, Stocks, Cricket, Horoscope - सब कुछ एक जगह</p>
</section>

<section id="chat" class="chat-section">
  <h2 style="text-align:center; margin-bottom:1rem;">Try Singh Ji AI</h2>
  <div class="chat-demo">
    <div class="chat-messages" id="chatMessages">
      <div class="message message-ai">नमस्ते! मैं Singh Ji AI हूँ। आज मैं आपकी क्या मदद कर सकता हूँ? 🙏</div>
    </div>
    <div class="chat-input-area">
      <button class="chat-btn" onclick="startVoice()" title="Voice">🎤</button>
      <input type="text" class="chat-input" id="chatInput" placeholder="Type in Hindi or English..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button class="chat-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
  </div>
</section>

<section class="features-section">
  <h2 style="text-align:center; margin-bottom:1rem;">All Features</h2>
  <div class="features-grid">
    <div class="feature-card" onclick="openModal('weather')">🌤️ Weather</div>
    <div class="feature-card" onclick="openModal('stock')">📊 Stocks</div>
    <div class="feature-card" onclick="openModal('cricket')">🏏 Cricket</div>
    <div class="feature-card" onclick="openModal('horoscope')">🔮 Horoscope</div>
    <div class="feature-card" onclick="openModal('train')">🚆 Train</div>
    <div class="feature-card" onclick="openModal('mandi')">🌾 Mandi</div>
    <div class="feature-card" onclick="openModal('news')">📰 News</div>
    <div class="feature-card" onclick="openModal('vision')">👁️ Image</div>
  </div>
</section>

<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://singhji-api.onrender.com';
let userId = localStorage.getItem('uid') || 'u_' + Date.now();
localStorage.setItem('uid', userId);

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function addMsg(text, sender) {
  const div = document.createElement('div');
  div.className = 'message message-' + sender;
  div.textContent = text;
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message message-ai'; div.id = 'typing';
  div.innerHTML = '<span class="loading"></span> Thinking...';
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

async function sendMessage() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim(); if(!text) return;
  addMsg(text, 'user'); inp.value = '';
  showTyping();
  try {
    const r = await fetch(API + '/api/ai-chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text, user_id: userId})
    });
    const d = await r.json();
    hideTyping();
    if(d.success) addMsg(d.response, 'ai');
    else throw new Error(d.error);
  } catch(e) {
    hideTyping();
    addMsg('⚠️ Server busy. Try: weather, stock, cricket, news, horoscope', 'error');
  }
}

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return showToast('Voice not supported', 'error');
  const r = new SR(); r.lang = 'hi-IN'; r.start();
  r.onresult = e => { document.getElementById('chatInput').value = e.results[0][0].transcript; sendMessage(); };
}

const FEATURES = {
  weather: {icon:'🌤️', title:'Weather', ph:'Enter city...', url:'/api/weather/', get:(q)=>q, method:'GET'},
  stock: {icon:'📊', title:'Stocks', ph:'Enter symbol (RELIANCE)...', url:'/api/stock/', get:(q)=>q.toUpperCase(), method:'GET'},
  cricket: {icon:'🏏', title:'Cricket', ph:'', url:'/api/cricket', get:()=>'', method:'GET', auto:true},
  horoscope: {icon:'🔮', title:'Horoscope', ph:'Enter sign (leo, aries)...', url:'/api/horoscope/', get:(q)=>q.toLowerCase(), method:'GET'},
  train: {icon:'🚆', title:'Train', ph:'Enter train number...', url:'/api/train/', get:(q)=>q, method:'GET'},
  mandi: {icon:'🌾', title:'Mandi Rates', ph:'Enter commodity (wheat)...', url:'/api/mandi?commodity=', get:(q)=>q.toLowerCase()+'&limit=5', method:'GET'},
  news: {icon:'📰', title:'News', ph:'Enter topic...', url:'/api/news?query=', get:(q)=>q, method:'GET'},
  vision: {icon:'👁️', title:'Image Analysis', ph:'', url:'/api/vision', type:'upload'}
};

function openModal(key) {
  const f = FEATURES[key]; if(!f) return;
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');

  if(f.type === 'upload') {
    content.innerHTML = '<h2>'+f.icon+' '+f.title+'</h2><div class="upload-area" onclick="document.getElementById('upfile').click()">📤 Click to upload image</div><input type="file" id="upfile" accept="image/*" style="display:none" onchange="uploadImage()"><div class="feature-result" id="result">Result here...</div>';
  } else if(f.auto) {
    content.innerHTML = '<h2>'+f.icon+' '+f.title+'</h2><div class="feature-result" id="result">Loading...</div>';
    setTimeout(() => executeFeature(key, ''), 300);
  } else {
    content.innerHTML = '<h2>'+f.icon+' '+f.title+'</h2><input class="feature-input" id="featInput" placeholder="'+f.ph+'" onkeypress="if(event.key==='Enter')executeFeature(''+key+'',this.value)"><button class="btn btn-primary" onclick="executeFeature(''+key+'',document.getElementById('featInput').value)" style="width:100%">Search</button><div class="feature-result" id="result">Result here...</div>';
  }
  modal.classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

async function executeFeature(key, query) {
  const f = FEATURES[key]; const res = document.getElementById('result');
  res.innerHTML = '<span class="loading"></span> Loading...';
  try {
    const url = API + f.url + encodeURIComponent(f.get(query));
    const r = await fetch(url, {method: f.method});
    const d = await r.json();

    if(key === 'weather') {
      res.innerHTML = d.error ? '❌ '+d.error : '🌡️ '+d.temperature+'°C | '+d.description+'<br>💧 '+d.humidity+'% | 💨 '+d.wind_speed+' km/h';
    } else if(key === 'stock') {
      res.innerHTML = d.error ? '❌ '+d.error : '<strong>'+d.symbol+'</strong> ₹'+d.current_price+'<br>'+(d.change>=0?'🟢':'🔴')+' '+d.change+' ('+d.change_percent+'%)';
    } else if(key === 'cricket') {
      res.innerHTML = d.matches ? d.matches.map(m => '<div><strong>'+m.title+'</strong><br>'+m.status+' | '+m.score+'</div>').join('') : 'No matches';
    } else if(key === 'horoscope') {
      res.innerHTML = d.success ? '🔮 <strong>'+d.hindi_name+'</strong><br>'+d.horoscope : '❌ '+d.error;
    } else if(key === 'train') {
      res.innerHTML = d.success ? '🚆 <strong>'+d.train_number+'</strong><br>'+(d.train_name||d.message)+'<br><a href="'+d.ntes_link+'" target="_blank">NTES Link</a>' : '❌ Error';
    } else if(key === 'mandi') {
      res.innerHTML = JSON.stringify(d).substring(0, 500);
    } else if(key === 'news') {
      res.innerHTML = d.news ? d.news.slice(0,5).map(n => '<div><a href="'+n.url+'" target="_blank">'+n.title+'</a></div>').join('') : 'No news';
    }
  } catch(e) {
    res.innerHTML = '❌ Error: ' + e.message;
  }
}

async function uploadImage() {
  const file = document.getElementById('upfile').files[0];
  if(!file) return;
  const res = document.getElementById('result');
  res.innerHTML = '<span class="loading"></span> Analyzing...';
  const fd = new FormData();
  fd.append('image', file);
  fd.append('prompt', 'Describe this image in detail');
  try {
    const r = await fetch(API + '/api/vision', {method: 'POST', body: fd});
    const d = await r.json();
    res.innerHTML = d.success ? d.analysis : '❌ '+d.error;
  } catch(e) {
    res.innerHTML = '❌ Upload failed';
  }
}

// Auto-load cricket on page load
window.addEventListener('load', () => {
  console.log('🦁 Singh Ji AI loaded');
});
</script>
</body>
</html>
