<script>
const API = 'https://singhji-api.onrender.com';
let userId = localStorage.getItem('uid') || 'u_' + Date.now();
localStorage.setItem('uid', userId);

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function addMsg(text, sender) {
  const div = document.createElement('div');
  div.className = 'message message-' + sender;
  div.textContent = text;
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message message-ai'; div.id = 'typing';
  div.innerHTML = '<span class="loading"></span> Thinking...';
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

async function sendMessage() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim(); if(!text) return;
  addMsg(text, 'user'); inp.value = '';
  showTyping();
  try {
    const r = await fetch(API + '/api/ai-chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text, user_id: userId})
    });
    const d = await r.json();
    hideTyping();
    if(d.success) addMsg(d.response, 'ai');
    else throw new Error(d.error);
  } catch(e) {
    hideTyping();
    addMsg('⚠️ Server busy. Try again!', 'error');
  }
}

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return showToast('Voice not supported', 'error');
  const r = new SR(); r.lang = 'hi-IN'; r.start();
  r.onresult = e => { document.getElementById('chatInput').value = e.results[0][0].transcript; sendMessage(); };
}

// ✅ FIXED: Plant added!
const FEATURES = {
  weather: {icon:'🌤️', title:'Weather', ph:'Enter city...', url:'/api/weather/', get:(q)=>q, method:'GET'},
  stock: {icon:'📊', title:'Stocks', ph:'Enter symbol (RELIANCE)...', url:'/api/stock/', get:(q)=>q.toUpperCase(), method:'GET'},
  cricket: {icon:'🏏', title:'Cricket', ph:'', url:'/api/cricket', get:()=>'', method:'GET', auto:true},
  horoscope: {icon:'🔮', title:'Horoscope', ph:'Enter sign (leo, aries)...', url:'/api/horoscope/', get:(q)=>q.toLowerCase(), method:'GET'},
  train: {icon:'🚆', title:'Train', ph:'Enter train number...', url:'/api/train/', get:(q)=>q, method:'GET'},
  mandi: {icon:'🌾', title:'Mandi Rates', ph:'Enter commodity (wheat)...', url:'/api/mandi?commodity=', get:(q)=>q.toLowerCase()+'&limit=5', method:'GET'},
  news: {icon:'📰', title:'News', ph:'Enter topic...', url:'/api/news?query=', get:(q)=>q, method:'GET'},
  vision: {icon:'👁️', title:'Image Analysis', ph:'', url:'/api/vision', type:'upload'},
  plant: {icon:'🌱', title:'Plant ID', ph:'', url:'/api/u11/webhook', type:'upload'}  // ✅ ADDED!
};

function openModal(key) {
  const f = FEATURES[key]; 
  if(!f) return;
  
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');

  if(f.type === 'upload') {
    // ✅ FIXED: Single quotes + escape
    var uploadText = (key === 'plant') ? '📤 Click to upload plant photo' : '📤 Click to upload image';
    var onchangeFunc = (key === 'plant') ? 'uploadPlantImage()' : 'uploadImage()';
    
    content.innerHTML = 
      '<h2>' + f.icon + ' ' + f.title + '</h2>' +
      '<div class="upload-area" onclick="document.getElementById(\'upfile\').click()">' + uploadText + '</div>' +
      '<input type="file" id="upfile" accept="image/*" style="display:none" onchange="' + onchangeFunc + '">' +
      '<div class="feature-result" id="result">Result here...</div>';
  } else if(f.auto) {
    content.innerHTML = '<h2>' + f.icon + ' ' + f.title + '</h2><div class="feature-result" id="result">Loading...</div>';
    setTimeout(function() { executeFeature(key, ''); }, 300);
  } else {
    content.innerHTML = 
      '<h2>' + f.icon + ' ' + f.title + '</h2>' +
      '<input class="feature-input" id="featInput" placeholder="' + f.ph + '" onkeypress="if(event.key===\'Enter\')executeFeature(\'' + key + '\',this.value)">' +
      '<button class="btn btn-primary" onclick="executeFeature(\'' + key + '\',document.getElementById(\'featInput\').value)" style="width:100%">Search</button>' +
      '<div class="feature-result" id="result">Result here...</div>';
  }
  modal.classList.add('active');
}

function closeModal() { 
  document.getElementById('modal').classList.remove('active'); 
}

async function executeFeature(key, query) {
  const f = FEATURES[key]; 
  const res = document.getElementById('result');
  res.innerHTML = '<span class="loading"></span> Loading...';
  try {
    const url = API + f.url + encodeURIComponent(f.get(query));
    const r = await fetch(url, {method: f.method});
    const d = await r.json();

    if(key === 'weather') {
      res.innerHTML = d.error ? '❌ ' + d.error : '🌡️ ' + d.temperature + '°C | ' + d.description + '<br>💧 ' + d.humidity + '% | 💨 ' + d.wind_speed + ' km/h';
    } else if(key === 'stock') {
      res.innerHTML = d.error ? '❌ ' + d.error : '<strong>' + d.symbol + '</strong> ₹' + d.current_price + '<br>' + (d.change >= 0 ? '🟢 ' : '🔴 ') + d.change + ' (' + d.change_percent + '%)';
    } else if(key === 'cricket') {
      res.innerHTML = d.matches ? d.matches.map(function(m) { return '<div><strong>' + m.title + '</strong><br>' + m.status + ' | ' + m.score + '</div>'; }).join('') : 'No matches';
    } else if(key === 'horoscope') {
      res.innerHTML = d.success ? '🔮 <strong>' + d.hindi_name + '</strong><br>' + d.horoscope : '❌ ' + d.error;
    } else if(key === 'train') {
      res.innerHTML = d.success ? '🚆 <strong>' + d.train_number + '</strong><br>' + (d.train_name || d.message) + '<br><a href="' + d.ntes_link + '" target="_blank">NTES Link</a>' : '❌ Error';
    } else if(key === 'mandi') {
      res.innerHTML = JSON.stringify(d).substring(0, 500);
    } else if(key === 'news') {
      res.innerHTML = d.news ? d.news.slice(0, 5).map(function(n) { return '<div><a href="' + n.url + '" target="_blank">' + n.title + '</a></div>'; }).join('') : 'No news';
    }
  } catch(e) {
    res.innerHTML = '❌ Error: ' + e.message;
  }
}

async function uploadImage() {
  const file = document.getElementById('upfile').files[0];
  if(!file) return;
  const res = document.getElementById('result');
  res.innerHTML = '<span class="loading"></span> Analyzing...';
  const fd = new FormData();
  fd.append('image', file);
  fd.append('prompt', 'Describe this image in detail');
  try {
    const r = await fetch(API + '/api/vision', {method: 'POST', body: fd});
    const d = await r.json();
    res.innerHTML = d.success ? d.analysis : '❌ ' + d.error;
  } catch(e) {
    res.innerHTML = '❌ Upload failed';
  }
}

// ✅ ADDED: Plant ID upload function
async function uploadPlantImage() {
  const file = document.getElementById('upfile').files[0];
  if(!file) return;
  
  const res = document.getElementById('result');
  res.innerHTML = '<span class="loading"></span> Paudha pehchan raha hoon...';
  
  const reader = new FileReader();
  reader.readAsDataURL(file);
  
  reader.onload = async function() {
    const base64 = reader.result.split(',')[1];
    
    try {
      const r = await fetch(API + '/api/u11/webhook', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({image: base64, action: 'identify'})
      });
      const d = await r.json();
      
      if(d.success) {
        res.innerHTML = '🌱 <b>' + d.plant_name + '</b><br>🎯 Confidence: ' + d.probability + '%<br>📛 Common Names: ' + (d.common_names ? d.common_names.join(', ') : 'N/A');
      } else {
        res.innerHTML = '❌ ' + d.error;
      }
    } catch(e) {
      res.innerHTML = '❌ Error: ' + e.message;
    }
  };
}

window.addEventListener('load', function() {
  console.log('🦁 Singh Ji AI loaded');
});
</script>
