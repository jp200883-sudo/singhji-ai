<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

/* 🎨 LOGO CONTAINER */
.logo-container {
    text-align: center;
    position: relative;
}

/* ❤️ BEATING HEART */
.heart-wrapper {
    position: relative;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
}

.heart {
    width: 120px;
    height: 108px;
    position: relative;
    animation: heartbeat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(233, 69, 96, 0.6));
}

.heart::before,
.heart::after {
    content: '';
    width: 60px;
    height: 96px;
    position: absolute;
    left: 60px;
    top: 0;
    background: linear-gradient(135deg, #e94560, #ff6b6b, #ff4757);
    border-radius: 60px 60px 0 0;
    transform: rotate(-45deg);
    transform-origin: 0 100%;
    box-shadow: inset -5px -5px 20px rgba(255,255,255,0.3);
}

.heart::after {
    left: 0;
    transform: rotate(45deg);
    transform-origin: 100% 100%;
}

/* 👀 EYES */
.eye-left, .eye-right {
    position: absolute;
    width: 14px;
    height: 18px;
    background: #1a1a2e;
    border-radius: 50%;
    top: 35px;
    z-index: 10;
    animation: blink 3s infinite;
}

.eye-left { left: 38px; }
.eye-right { right: 38px; }

.eye-left::after, .eye-right::after {
    content: '';
    position: absolute;
    width: 6px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    top: 3px;
    right: 3px;
}

/* 😊 SMILE */
.smile {
    position: absolute;
    width: 30px;
    height: 15px;
    border-bottom: 3px solid #1a1a2e;
    border-radius: 0 0 30px 30px;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
}

/* ✨ 4-POINT SPARKLE */
.sparkle {
    position: absolute;
    width: 20px;
    height: 20px;
    z-index: 20;
}

.sparkle::before,
.sparkle::after {
    content: '';
    position: absolute;
    background: linear-gradient(45deg, #ffd700, #ffed4a);
    border-radius: 50%;
}

.sparkle::before {
    width: 20px;
    height: 6px;
    top: 7px;
    left: 0;
    animation: sparkleRotate 2s linear infinite;
}

.sparkle::after {
    width: 6px;
    height: 20px;
    top: 0;
    left: 7px;
    animation: sparkleRotate 2s linear infinite reverse;
}

.sparkle-1 { top: -15px; left: -10px; animation: sparkleFloat 2s ease-in-out infinite; }
.sparkle-2 { top: -10px; right: -15px; animation: sparkleFloat 2.5s ease-in-out infinite 0.5s; }
.sparkle-3 { bottom: -5px; left: -15px; animation: sparkleFloat 2.2s ease-in-out infinite 1s; }
.sparkle-4 { bottom: -10px; right: -10px; animation: sparkleFloat 2.8s ease-in-out infinite 1.5s; }

/* 🌟 GLOW RING */
.glow-ring {
    position: absolute;
    width: 160px;
    height: 160px;
    border: 2px solid rgba(233, 69, 96, 0.3);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: glowPulse 2s ease-in-out infinite;
}

.glow-ring::before {
    content: '';
    position: absolute;
    width: 180px;
    height: 180px;
    border: 1px solid rgba(233, 69, 96, 0.15);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: glowPulse 2s ease-in-out infinite 0.5s;
}

/* 📝 TEXT */
.brand-text {
    margin-top: 30px;
    font-size: 2rem;
    font-weight: bold;
    background: linear-gradient(90deg, #e94560, #ff6b6b, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 40px rgba(233, 69, 96, 0.5);
    animation: textGlow 2s ease-in-out infinite;
}

.tagline {
    margin-top: 10px;
    color: #888;
    font-size: 1rem;
    letter-spacing: 2px;
}

/* 🔑 ANIMATIONS */
@keyframes heartbeat {
    0% { transform: scale(1); }
    14% { transform: scale(1.1); }
    28% { transform: scale(1); }
    42% { transform: scale(1.1); }
    70% { transform: scale(1); }
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
}

@keyframes sparkleRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes sparkleFloat {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.3) rotate(180deg); opacity: 0.7; }
}

@keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
}

@keyframes textGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
}

<div class="header">
    <!-- ❤️ HEART LOGO -->
    <div class="heart-wrapper">
        <div class="glow-ring"></div>
        <div class="heart">
            <div class="eye-left"></div>
            <div class="eye-right"></div>
            <div class="smile"></div>
        </div>
        <div class="sparkle sparkle-1"></div>
        <div class="sparkle sparkle-2"></div>
        <div class="sparkle sparkle-3"></div>
        <div class="sparkle sparkle-4"></div>
    </div>
    
    <h1>Singh Ji AI</h1>
    <p>भारत का अपना AI ❤️</p>
</div>
